# Example OTLP secret. Copy, fill in, and `kubectl apply`. Do NOT commit real
# tokens. The agent + collector read these keys (all optional — omit for
# Prometheus-only mode).
#
#   kubectl create secret generic vllm-llmd-otlp -n monitoring \
#     --from-literal=OTEL_EXPORTER_OTLP_ENDPOINT=https://otlp.example.io \
#     --from-literal=OTEL_EXPORTER_OTLP_HEADERS="Authorization=Bearer <token>" \
#     --from-literal=OTLP_AUTH_HEADER="Bearer <token>"
apiVersion: v1
kind: Secret
metadata:
  name: vllm-llmd-otlp
  namespace: monitoring
type: Opaque
stringData:
  OTEL_EXPORTER_OTLP_ENDPOINT: "https://otlp.example.io"
  OTEL_EXPORTER_OTLP_HEADERS: "Authorization=Bearer REPLACE_ME"
  OTLP_AUTH_HEADER: "Bearer REPLACE_ME"
