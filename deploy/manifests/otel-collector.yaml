# Optional OpenTelemetry Collector — receives OTLP from the agent (or scrapes
# Prometheus) and fans out to any OTLP backend (Grafana Cloud, Datadog, etc.).
# No backend is baked into the agent — swap the exporter here to target any
# OTLP destination.
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: monitoring
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          http:
            endpoint: 0.0.0.0:4318
          grpc:
            endpoint: 0.0.0.0:4317
      # Also scrape the agent + DCGM Prometheus endpoints directly.
      prometheus:
        config:
          scrape_configs:
            - job_name: vllm-llmd-agent
              scrape_interval: 30s
              kubernetes_sd_configs:
                - role: pod
                  namespaces:
                    names: [monitoring]
              relabel_configs:
                - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
                  regex: vllm-llmd-agent
                  action: keep
                - source_labels: [__address__]
                  regex: (.+):.*
                  replacement: ${1}:9835
                  target_label: __address__

    processors:
      batch: {}
      # Enrich anything missing pod/workload attribution.
      k8sattributes:
        auth_type: serviceAccount
        extract:
          metadata:
            - k8s.pod.name
            - k8s.namespace.name
            - k8s.deployment.name
            - k8s.node.name
      resourcedetection:
        detectors: [env, system]

    exporters:
      # Point this at your OTLP backend. Endpoint/headers come from env.
      otlphttp:
        endpoint: ${env:OTEL_EXPORTER_OTLP_ENDPOINT}
        headers:
          authorization: ${env:OTLP_AUTH_HEADER}
      debug:
        verbosity: normal

    service:
      pipelines:
        metrics:
          receivers: [otlp, prometheus]
          processors: [k8sattributes, resourcedetection, batch]
          exporters: [otlphttp]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: monitoring
  labels:
    app.kubernetes.io/name: otel-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: otel-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: otel-collector
    spec:
      serviceAccountName: vllm-llmd-agent   # reuse read-only RBAC
      containers:
        - name: collector
          image: otel/opentelemetry-collector-contrib:0.104.0
          args: ["--config=/etc/otel/config.yaml"]
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: vllm-llmd-otlp
                  key: OTEL_EXPORTER_OTLP_ENDPOINT
                  optional: true
            - name: OTLP_AUTH_HEADER
              valueFrom:
                secretKeyRef:
                  name: vllm-llmd-otlp
                  key: OTLP_AUTH_HEADER
                  optional: true
          ports:
            - { name: otlp-http, containerPort: 4318 }
            - { name: otlp-grpc, containerPort: 4317 }
          volumeMounts:
            - name: config
              mountPath: /etc/otel
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: "1", memory: 1Gi }
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: monitoring
  labels:
    app.kubernetes.io/name: otel-collector
spec:
  selector:
    app.kubernetes.io/name: otel-collector
  ports:
    - { name: otlp-http, port: 4318, targetPort: otlp-http }
    - { name: otlp-grpc, port: 4317, targetPort: otlp-grpc }
