{{- if .Values.prometheus.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "vllm-llmd.fullname" . }}-prometheus
  namespace: {{ .Release.Namespace }}
  labels: {{- include "vllm-llmd.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "vllm-llmd.fullname" . }}-prometheus
  labels: {{- include "vllm-llmd.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/metrics", "services", "endpoints", "pods"]
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "vllm-llmd.fullname" . }}-prometheus
  labels: {{- include "vllm-llmd.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "vllm-llmd.fullname" . }}-prometheus
subjects:
  - kind: ServiceAccount
    name: {{ include "vllm-llmd.fullname" . }}-prometheus
    namespace: {{ .Release.Namespace }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vllm-llmd.fullname" . }}-prometheus
  namespace: {{ .Release.Namespace }}
  labels: {{- include "vllm-llmd.labels" . | nindent 4 }}
data:
  prometheus.yml: |
    global:
      scrape_interval: {{ .Values.prometheus.scrapeInterval }}
      evaluation_interval: {{ .Values.prometheus.scrapeInterval }}
      {{- with .Values.prometheus.externalLabels }}
      external_labels:
{{ toYaml . | indent 8 }}
      {{- end }}
    scrape_configs:
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: node
      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]
    {{- with .Values.prometheus.remoteWrite }}
    remote_write:
{{ toYaml . | indent 6 }}
    {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vllm-llmd.fullname" . }}-prometheus
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vllm-llmd.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
spec:
  replicas: {{ .Values.prometheus.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "vllm-llmd.name" . }}
      app.kubernetes.io/component: prometheus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "vllm-llmd.name" . }}
        app.kubernetes.io/component: prometheus
    spec:
      serviceAccountName: {{ include "vllm-llmd.fullname" . }}-prometheus
      containers:
        - name: prometheus
          image: {{ .Values.prometheus.image }}
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time={{ .Values.prometheus.retention }}"
          ports:
            - name: web
              containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
          resources: {{- toYaml .Values.prometheus.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "vllm-llmd.fullname" . }}-prometheus
        - name: data
          {{- if .Values.prometheus.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "vllm-llmd.fullname" . }}-prometheus
          {{- else }}
          emptyDir: {}
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "vllm-llmd.fullname" . }}-prometheus
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vllm-llmd.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
spec:
  selector:
    app.kubernetes.io/name: {{ include "vllm-llmd.name" . }}
    app.kubernetes.io/component: prometheus
  ports:
    - name: web
      port: 9090
      targetPort: web
{{- if .Values.prometheus.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "vllm-llmd.fullname" . }}-prometheus
  namespace: {{ .Release.Namespace }}
  labels: {{- include "vllm-llmd.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.prometheus.persistence.size }}
  {{- with .Values.prometheus.persistence.storageClass }}
  storageClassName: {{ . }}
  {{- end }}
{{- end }}
{{- end }}
