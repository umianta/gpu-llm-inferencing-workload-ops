{{- if .Values.grafana.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vllm-llmd.fullname" . }}-grafana-datasources
  namespace: {{ .Release.Namespace }}
  labels: {{- include "vllm-llmd.labels" . | nindent 4 }}
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        access: proxy
        url: http://{{ include "vllm-llmd.fullname" . }}-prometheus.{{ .Release.Namespace }}:9090
        isDefault: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vllm-llmd.fullname" . }}-grafana-provider
  namespace: {{ .Release.Namespace }}
  labels: {{- include "vllm-llmd.labels" . | nindent 4 }}
data:
  provider.yaml: |
    apiVersion: 1
    providers:
      - name: vllm-llmd
        orgId: 1
        folder: "vLLM / llm-d"
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vllm-llmd.fullname" . }}-grafana-dashboards
  namespace: {{ .Release.Namespace }}
  labels: {{- include "vllm-llmd.labels" . | nindent 4 }}
data:
  executive-overview.json: |-
{{ .Files.Get "dashboards/executive-overview.json" | replace "${DS_PROMETHEUS}" "prometheus" | indent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vllm-llmd.fullname" . }}-grafana
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vllm-llmd.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "vllm-llmd.name" . }}
      app.kubernetes.io/component: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "vllm-llmd.name" . }}
        app.kubernetes.io/component: grafana
    spec:
      securityContext:
        runAsUser: 472
        fsGroup: 472
      containers:
        - name: grafana
          image: {{ .Values.grafana.image }}
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: {{ .Values.grafana.adminUser | quote }}
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: {{ .Values.grafana.adminPassword | quote }}
          ports:
            - name: http
              containerPort: 3000
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
          resources: {{- toYaml .Values.grafana.resources | nindent 12 }}
      volumes:
        - name: datasources
          configMap:
            name: {{ include "vllm-llmd.fullname" . }}-grafana-datasources
        - name: provider
          configMap:
            name: {{ include "vllm-llmd.fullname" . }}-grafana-provider
        - name: dashboards
          configMap:
            name: {{ include "vllm-llmd.fullname" . }}-grafana-dashboards
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "vllm-llmd.fullname" . }}-grafana
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vllm-llmd.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  type: {{ .Values.grafana.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "vllm-llmd.name" . }}
    app.kubernetes.io/component: grafana
  ports:
    - name: http
      port: 3000
      targetPort: http
      {{- if and (eq .Values.grafana.service.type "NodePort") .Values.grafana.service.nodePort }}
      nodePort: {{ .Values.grafana.service.nodePort }}
      {{- end }}
{{- end }}
