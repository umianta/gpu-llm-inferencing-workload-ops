{{- if .Values.agent.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "vllm-llmd.agent.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "vllm-llmd.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "vllm-llmd.name" . }}
      app.kubernetes.io/component: agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "vllm-llmd.name" . }}
        app.kubernetes.io/component: agent
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.agent.prometheusPort | quote }}
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: {{ include "vllm-llmd.agent.fullname" . }}
      hostPID: {{ .Values.agent.hostPID }}
      {{- with .Values.agent.nvidiaRuntimeClassName }}
      runtimeClassName: {{ . }}
      {{- end }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.agent.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.agent.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: agent
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--sink"
            - {{ if .Values.otlp.enabled }}"both"{{ else }}"prometheus"{{ end }}
            - "--interval"
            - {{ .Values.agent.intervalSeconds | quote }}
            - "--prometheus-port"
            - {{ .Values.agent.prometheusPort | quote }}
            - "--gpu-hourly-usd"
            - {{ .Values.agent.gpuHourlyUsd | quote }}
            {{- if not .Values.agent.discovery.enabled }}
            - "--no-discovery"
            {{- end }}
            {{- with .Values.agent.discovery.vllmSelector }}
            - "--vllm-selector"
            - {{ . | quote }}
            {{- end }}
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: CLUSTER
              value: {{ .Values.cluster | quote }}
            - name: NVIDIA_VISIBLE_DEVICES
              value: {{ .Values.agent.nvidiaVisibleDevices | quote }}
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: "utility"
            {{- if .Values.agent.costPersistence.enabled }}
            - name: COST_STATE_PATH
              value: {{ printf "%s/cost.json" .Values.agent.costPersistence.hostPath | quote }}
            {{- end }}
            {{- with .Values.agent.vllmEndpoints }}
            - name: VLLM_ENDPOINTS
              value: {{ join "," . | quote }}
            {{- end }}
            {{- with .Values.agent.llmdEndpoints }}
            - name: LLMD_ENDPOINTS
              value: {{ join "," . | quote }}
            {{- end }}
            {{- if .Values.otlp.enabled }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: {{ include "vllm-llmd.fullname" . }}-otlp
                  key: OTEL_EXPORTER_OTLP_ENDPOINT
            - name: OTEL_EXPORTER_OTLP_HEADERS
              valueFrom:
                secretKeyRef:
                  name: {{ include "vllm-llmd.fullname" . }}-otlp
                  key: OTEL_EXPORTER_OTLP_HEADERS
            {{- end }}
          ports:
            - name: metrics
              containerPort: {{ .Values.agent.prometheusPort }}
          {{- if .Values.agent.costPersistence.enabled }}
          volumeMounts:
            - name: cost-state
              mountPath: {{ .Values.agent.costPersistence.hostPath }}
          {{- end }}
          resources: {{- toYaml .Values.agent.resources | nindent 12 }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
      {{- if .Values.agent.costPersistence.enabled }}
      initContainers:
        - name: cost-state-perms
          image: busybox:1.36
          command: ["sh", "-c", "mkdir -p {{ .Values.agent.costPersistence.hostPath }} && chown 65532:65532 {{ .Values.agent.costPersistence.hostPath }}"]
          volumeMounts:
            - name: cost-state
              mountPath: {{ .Values.agent.costPersistence.hostPath }}
          securityContext:
            runAsUser: 0
      volumes:
        - name: cost-state
          hostPath:
            path: {{ .Values.agent.costPersistence.hostPath }}
            type: DirectoryOrCreate
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "vllm-llmd.agent.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vllm-llmd.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: {{ include "vllm-llmd.name" . }}
    app.kubernetes.io/component: agent
  ports:
    - name: metrics
      port: {{ .Values.agent.prometheusPort }}
      targetPort: metrics
{{- end }}
