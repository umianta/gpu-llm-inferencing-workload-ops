{{- if .Values.agent.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "vllm-llmd.agent.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "vllm-llmd.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "vllm-llmd.agent.fullname" . }}
  labels: {{- include "vllm-llmd.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["replicasets", "deployments", "statefulsets"]
    verbs: ["get", "list", "watch"]
  # Required so the llm-d EPP SubjectAccessReview authorizes /metrics scraping.
  - nonResourceURLs: ["/metrics"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "vllm-llmd.agent.fullname" . }}
  labels: {{- include "vllm-llmd.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "vllm-llmd.agent.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "vllm-llmd.agent.fullname" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
